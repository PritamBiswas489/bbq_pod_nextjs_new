<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Brochure Request – APEX</title>
</head>
<body style="margin:0;padding:0;background-color:#0f0f0f;font-family:'Georgia',serif;">

  <div style="display:none;max-height:0;overflow:hidden;font-size:1px;color:#0f0f0f;">
    Your APEX brochure request has been received. We'll send it your way shortly.
  </div>

  <!-- Wrapper -->
  <table width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:#0f0f0f;padding:48px 20px;">
    <tr>
      <td align="center">

        <!-- Card -->
        <table width="560" cellpadding="0" cellspacing="0" border="0" style="max-width:560px;width:100%;background-color:#141414;border:1px solid #2a2a2a;border-radius:2px;">

          
          <!-- Body -->
          <tr>
            <td style="padding:40px 48px 36px;">

              <p style="margin:0 0 32px;font-size:14px;color:#888;font-family:Arial,sans-serif;line-height:1.7;">
                A new brochure request has been submitted. The details are listed below.
              </p>

              <!-- Detail Rows -->
              <!-- Name -->
              <table width="100%" cellpadding="0" cellspacing="0" border="0" style="margin-bottom:1px;">
                <tr>
                  <td style="background:#1a1a1a;border-left:3px solid #c8a96e;padding:18px 24px;">
                    <p style="margin:0 0 4px;font-size:10px;color:#c8a96e;letter-spacing:3px;text-transform:uppercase;font-family:Arial,sans-serif;">Name</p>
                    <p style="margin:0;font-size:16px;color:#f0f0f0;font-family:'Georgia',serif;">[customer_name]</p>
                  </td>
                </tr>
              </table>

              <!-- Email -->
              <table width="100%" cellpadding="0" cellspacing="0" border="0" style="margin-bottom:1px;">
                <tr>
                  <td style="background:#1a1a1a;border-left:3px solid #555;padding:18px 24px;">
                    <p style="margin:0 0 4px;font-size:10px;color:#888;letter-spacing:3px;text-transform:uppercase;font-family:Arial,sans-serif;">Email</p>
                    <p style="margin:0;font-size:15px;color:#c8a96e;font-family:Arial,sans-serif;">
                      <a href="mailto:[customer_email]" style="color:#c8a96e;text-decoration:none;">[customer_email]</a>
                    </p>
                  </td>
                </tr>
              </table>

              <!-- Language -->
              <table width="100%" cellpadding="0" cellspacing="0" border="0" style="margin-bottom:0;">
                <tr>
                  <td style="background:#1a1a1a;border-left:3px solid #555;padding:18px 24px;">
                    <p style="margin:0 0 4px;font-size:10px;color:#888;letter-spacing:3px;text-transform:uppercase;font-family:Arial,sans-serif;">Language</p>
                    <p style="margin:0;font-size:15px;color:#f0f0f0;font-family:Arial,sans-serif;">
                      <span style="display:inline-block;background:#252525;border:1px solid #333;color:#d0d0d0;font-size:11px;letter-spacing:2px;text-transform:uppercase;padding:4px 12px;font-family:Arial,sans-serif;border-radius:1px;">[customer_language]</span>
                    </p>
                  </td>
                </tr>
              </table>


              <table width="100%" cellpadding="0" cellspacing="0" border="0" style="margin-bottom:0;">
                <tr>
                  <td style="background:#1a1a1a;border-left:3px solid #555;padding:18px 24px;">
                    <p style="margin:0 0 4px;font-size:10px;color:#888;letter-spacing:3px;text-transform:uppercase;font-family:Arial,sans-serif;">Date</p>
                    <p style="margin:0;font-size:15px;color:#f0f0f0;font-family:Arial,sans-serif;">
                      <span style="display:inline-block;background:#252525;border:1px solid #333;color:#d0d0d0;font-size:11px;letter-spacing:2px;text-transform:uppercase;padding:4px 12px;font-family:Arial,sans-serif;border-radius:1px;">[customer_date]</span>
                    </p>
                  </td>
                </tr>
              </table>

              <table width="100%" cellpadding="0" cellspacing="0" border="0" style="margin-bottom:0;">
                <tr>
                  <td style="background:#1a1a1a;border-left:3px solid #555;padding:18px 24px;">
                    <p style="margin:0 0 4px;font-size:10px;color:#888;letter-spacing:3px;text-transform:uppercase;font-family:Arial,sans-serif;">Ip address</p>
                    <p style="margin:0;font-size:15px;color:#f0f0f0;font-family:Arial,sans-serif;">
                      <span style="display:inline-block;background:#252525;border:1px solid #333;color:#d0d0d0;font-size:11px;letter-spacing:2px;text-transform:uppercase;padding:4px 12px;font-family:Arial,sans-serif;border-radius:1px;">[customer_ip]</span>
                    </p>
                  </td>
                </tr>
              </table>

            </td>
          </tr>

         
        </table>

      </td>
    </tr>
  </table>

</body>
</html>
